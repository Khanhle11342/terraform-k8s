apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello

spec:

  replicas: 1

  selector:
    matchLabels:
      app: hello

  template:

    metadata:
      labels:
        app: hello

    spec:

      containers:

      - name: hello

        image: hashicorp/http-echo:1.0.0

        args:
        - "-text=Welcome to Khanh DevOps Lab"

        ports:

        - containerPort: 5678
